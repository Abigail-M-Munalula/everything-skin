<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everything Skin | Home</title>
    <style>
        :root { 
            /* Colors from your specific palette */
            --soft-cream: #F9F6F0; 
            --warm-white: #FFF9F9;
            --warm-grey: #4A4A4A;
            --medium-grey: #5A5A5A;
            --sage-green: #8CA68A;
            --glass: rgba(255, 249, 249, 0.95); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            background-color: var(--soft-cream); 
            color: var(--medium-grey); 
            overflow-x: hidden;
            background-image: linear-gradient(rgba(249, 246, 240, 0.8), rgba(249, 246, 240, 0.8)), url('PHOTOS/LABEL.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* --- RESPONSIVE HORIZONTAL NAVIGATION --- */
        nav { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 80px; 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(74, 74, 74, 0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 6%; 
            z-index: 1000; 
        }

        .nav-logo { 
            font-weight: 900; 
            color: var(--warm-grey); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: clamp(1rem, 4vw, 1.2rem); /* Scales down smoothly on small screens */
        }

        .nav-links { 
            list-style: none; 
            display: flex; 
            gap: clamp(15px, 3vw, 40px); /* Brings links closer together dynamically */
            align-items: center;
        }

        .nav-links a { 
            color: var(--medium-grey); 
            text-decoration: none; 
            font-size: clamp(0.7rem, 2vw, 0.8rem); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-family: monospace;
            transition: 0.3s;
            position: relative;
            padding: 10px 0;
        }

        .nav-links a.active, .nav-links a:hover { 
            color: var(--sage-green); 
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--sage-green);
            transition: 0.3s;
        }
        .nav-links a:hover::after, .nav-links a.active::after { 
            width: 100%; 
        }

        .nav-status {
            font-size: 0.75rem; 
            color: var(--sage-green); 
            font-weight: bold; 
            font-family: monospace; 
            letter-spacing: 1px;
        }

        /* --- RESPONSIVE HERO LAYOUT --- */
        .hero { 
            min-height: 100vh; /* Ensures content fits vertically even on short screens */
            display: flex; 
            align-items: center; 
            padding: 120px 8% 60px; /* Top padding leaves space for navigation bar */
            background: transparent; 
        }

        .hero-content {
            max-width: 750px;
            width: 100%;
        }

        .hero h1 { 
            font-size: clamp(2.5rem, 7vw, 4.5rem); /* Dynamic text sizing rule */
            color: var(--warm-grey); 
            line-height: 1.1; 
        }

        .hero p { 
            max-width: 600px; 
            margin: clamp(15px, 4vw, 25px) 0 clamp(25px, 5vw, 35px); 
            font-size: clamp(0.95rem, 2.5vw, 1.1rem); 
            color: var(--medium-grey); 
            line-height: 1.6;
        }

        .btn { 
            padding: clamp(12px, 2.5vw, 16px) clamp(24px, 5vw, 36px); 
            background-color: var(--sage-green); 
            color: var(--warm-white); 
            border: 1px solid var(--sage-green); 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: clamp(0.75rem, 2vw, 0.85rem); 
            letter-spacing: 2px; 
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            display: inline-block;
            box-shadow: 0 4px 12px rgba(140, 166, 138, 0.25);
            text-align: center;
        }

        .btn:hover { 
            background-color: var(--warm-grey); 
            border-color: var(--warm-grey);
            color: var(--warm-white);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 74, 74, 0.2);
        }

        /* --- MOBILE SCREEN MEDIA QUERY BREAKPOINT --- */
        @media (max-width: 768px) {
            nav { 
                padding: 0 4%; 
                height: 70px;
            }
            
            .nav-status { 
                display: none; /* Frees space on tiny header strips */
            }

            .hero { 
                padding: 100px 5% 40px; 
                align-items: center; 
                text-align: center; /* Centers alignment for mobile aesthetics */
            }

            .hero p {
                margin-left: auto;
                margin-right: auto;
            }
            
            .btn {
                width: 100%; /* Makes button punchy and easy to tap with a thumb */
                max-width: 320px;
            }
        }

        /* Extra consideration for ultra-small or narrow mobile views */
        @media (max-width: 480px) {
            .nav-links { gap: 10px; }
            .nav-links a { letter-spacing: 1px; font-size: 0.65rem; }
            .hero h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">EVERYTHING SKIN</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="education.html">Skin School</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 style="font-weight: 300;">Radiance begins<br><span style="font-weight: 800;">with knowledge.</span></h1>
            <p>A professional platform providing informed skincare routines and sustainable beauty practices.</p>
            <a href="education.html" class="btn">Skin School</a>
        </div>
    </header>

</body>
</html>
